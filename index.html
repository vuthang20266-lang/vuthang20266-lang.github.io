<!DOCTYPE html>
<html>
<head>
  <title>Website của Thắng</title>
  <style>
    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
    }
    h1 {
      font-size: 40px;
    }
    p {
      font-size: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: gold;
    }
    button:hover {
      background-color: orange;
    }
  </style>
</head>
<body>

  <h1>🔥 Chào mừng đến website của tôi 🔥</h1>
  <p>Tôi vừa đưa web này lên Internet 🚀</p>
  <button onclick="alert('Chúc bạn một ngày tốt lành 😎')">
    Bấm vào tôi
  </button>

</body>
</html>
